version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_volume:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///app/uploads/dictation.db
      - UPLOAD_DIR=/app/uploads
      - ALLOWED_HOSTS=*
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Avoid mounting host node_modules over container node_modules
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  uploads_volume:
